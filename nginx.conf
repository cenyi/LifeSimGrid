server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # -----------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------
    # Locale root redirect — default to English
    # -----------------------------------------------------------
    location = / {
        return 302 /en;
    }

    # -----------------------------------------------------------
    # Static assets — aggressive caching with immutable flag
    # Next.js static export uses _next/static/ with content hashes
    # -----------------------------------------------------------
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------
    # SPA fallback — try file, then folder index, then 404
    # -----------------------------------------------------------
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # -----------------------------------------------------------
    # Custom 404 page
    # -----------------------------------------------------------
    error_page 404 /404.html;
}
