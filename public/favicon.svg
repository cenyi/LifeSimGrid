<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="#1a1a2e"/>

  <!-- 岛屿/网格主体 -->
  <rect x="20" y="20" width="60" height="60" rx="12" fill="#16213e" stroke="#0f3460" stroke-width="2"/>

  <!-- 像素网格线 -->
  <g stroke="#0f3460" stroke-width="1" opacity="0.5">
    <line x1="35" y1="20" x2="35" y2="80"/>
    <line x1="50" y1="20" x2="50" y2="80"/>
    <line x1="65" y1="20" x2="65" y2="80"/>
    <line x1="20" y1="35" x2="80" y2="35"/>
    <line x1="20" y1="50" x2="80" y2="50"/>
    <line x1="20" y1="65" x2="80" y2="65"/>
  </g>

  <!-- 中心像素点（高亮） -->
  <rect x="36" y="36" width="13" height="13" rx="3" fill="#e94560"/>
  <rect x="51" y="36" width="13" height="13" rx="3" fill="#e94560" opacity="0.7"/>
  <rect x="36" y="51" width="13" height="13" rx="3" fill="#e94560" opacity="0.7"/>
  <rect x="51" y="51" width="13" height="13" rx="3" fill="#e94560" opacity="0.4"/>

  <!-- 装饰性小点 -->
  <circle cx="28" cy="28" r="3" fill="#533483"/>
  <circle cx="72" cy="28" r="3" fill="#533483"/>
  <circle cx="28" cy="72" r="3" fill="#533483"/>
  <circle cx="72" cy="72" r="3" fill="#533483"/>

  <!-- 顶部装饰条 -->
  <rect x="20" y="20" width="60" height="4" rx="2" fill="#e94560" opacity="0.8"/>
</svg>