<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="50%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.95" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="rgba(0,0,0,0.2)" />
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)" />
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#cardGradient)" filter="url(#shadow)" />

  <!-- Mini island grid preview -->
  <g transform="translate(100, 120)">
    <!-- Grid background -->
    <rect x="0" y="0" width="280" height="280" rx="16" fill="#f1f5f9" />
    <!-- Grid lines -->
    <g stroke="#e2e8f0" stroke-width="1">
      <line x1="40" y1="0" x2="40" y2="280"/>
      <line x1="80" y1="0" x2="80" y2="280"/>
      <line x1="120" y1="0" x2="120" y2="280"/>
      <line x1="160" y1="0" x2="160" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
      <line x1="240" y1="0" x2="240" y2="280"/>
      <line x1="0" y1="40" x2="280" y2="40"/>
      <line x1="0" y1="80" x2="280" y2="80"/>
      <line x1="0" y1="120" x2="280" y2="120"/>
      <line x1="0" y1="160" x2="280" y2="160"/>
      <line x1="0" y1="200" x2="280" y2="200"/>
      <line x1="0" y1="240" x2="280" y2="240"/>
    </g>
    <!-- Buildings -->
    <rect x="5" y="5" width="30" height="30" rx="4" fill="#f59e0b"/>
    <text x="20" y="26" text-anchor="middle" font-size="18">🏠</text>
    <rect x="45" y="5" width="30" height="30" rx="4" fill="#f59e0b"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">🏠</text>
    <rect x="125" y="125" width="30" height="30" rx="4" fill="#06b6d4"/>
    <text x="140" y="146" text-anchor="middle" font-size="18">⛲</text>
    <rect x="5" y="245" width="30" height="30" rx="4" fill="#22c55e"/>
    <text x="20" y="266" text-anchor="middle" font-size="18">🌳</text>
    <rect x="245" y="5" width="30" height="30" rx="4" fill="#ec4899"/>
    <text x="260" y="26" text-anchor="middle" font-size="18">🛒</text>
    <rect x="245" y="245" width="30" height="30" rx="4" fill="#6366f1"/>
    <text x="260" y="266" text-anchor="middle" font-size="18">🏢</text>
    <rect x="125" y="45" width="30" height="30" rx="4" fill="#a16207"/>
    <text x="140" y="66" text-anchor="middle" font-size="18">☕</text>
    <rect x="125" y="205" width="30" height="30" rx="4" fill="#dc2626"/>
    <text x="140" y="226" text-anchor="middle" font-size="18">🍽️</text>
  </g>

  <!-- Title section -->
  <text x="600" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#textShadow)">LifeSimGrid</text>

  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1e293b">Tomodachi Life</text>
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0d9488">Island Planner</text>
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="normal" fill="#64748b">Interactive Grid Layout Designer</text>

  <!-- Feature tags -->
  <g transform="translate(420, 410)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#0d9488" opacity="0.1"/>
    <text x="60" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">🏝️ Grid Editor</text>
  </g>
  <g transform="translate(560, 410)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#8b5cf6" opacity="0.1"/>
    <text x="70" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6">🧠 MBTI-Aware</text>
  </g>
  <g transform="translate(720, 410)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#f59e0b" opacity="0.1"/>
    <text x="60" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">📤 Export</text>
  </g>

  <g transform="translate(1050, 550)">
    <circle cx="0" cy="0" r="30" fill="#0d9488"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">🎮</text>
  </g>

  <rect x="60" y="590" width="1080" height="2" rx="1" fill="#e2e8f0" opacity="0.5"/>
</svg>
