<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.95" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="rgba(0,0,0,0.2)" />
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)" />
    </filter>
    <pattern id="wavePattern" width="120" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 Q 30 0, 60 20 Q 90 40, 120 20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />
  <rect width="1200" height="630" fill="url(#wavePattern)" />

  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#cardGradient)" filter="url(#shadow)" />

  <!-- Audio waveform -->
  <g transform="translate(140, 160)">
    <rect x="0" y="40" width="12" height="80" rx="6" fill="#7c3aed" opacity="0.8" />
    <rect x="22" y="20" width="12" height="120" rx="6" fill="#8b5cf6" opacity="0.8" />
    <rect x="44" y="50" width="12" height="60" rx="6" fill="#a855f7" opacity="0.8" />
    <rect x="66" y="10" width="12" height="140" rx="6" fill="#7c3aed" opacity="0.9" />
    <rect x="88" y="30" width="12" height="100" rx="6" fill="#8b5cf6" opacity="0.8" />
    <rect x="110" y="55" width="12" height="50" rx="6" fill="#a855f7" opacity="0.7" />
    <rect x="132" y="15" width="12" height="130" rx="6" fill="#7c3aed" opacity="0.9" />
    <rect x="154" y="45" width="12" height="70" rx="6" fill="#8b5cf6" opacity="0.8" />
    <rect x="176" y="25" width="12" height="110" rx="6" fill="#a855f7" opacity="0.8" />
  </g>

  <!-- Speaker icon -->
  <g transform="translate(880, 155)">
    <rect x="0" y="20" width="30" height="50" rx="4" fill="#7c3aed" opacity="0.9" />
    <polygon points="30,20 65,0 65,90 30,70" fill="#8b5cf6" opacity="0.9" />
    <path d="M 75 25 Q 95 45, 75 65" fill="none" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <path d="M 85 10 Q 115 45, 85 80" fill="none" stroke="#ec4899" stroke-width="4" stroke-linecap="round" opacity="0.7" />
  </g>

  <!-- 8-bit label -->
  <g transform="translate(890, 290)">
    <rect x="0" y="0" width="80" height="36" rx="8" fill="#7c3aed" opacity="0.85" />
    <text x="40" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">8-BIT</text>
  </g>

  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#textShadow)">LifeSimGrid</text>

  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1e293b">Tomodachi Voice Lab</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="normal" fill="#64748b">8-Bit Mii Voice Synthesizer</text>

  <rect x="60" y="590" width="1080" height="2" rx="1" fill="#e2e8f0" opacity="0.5" />
</svg>
