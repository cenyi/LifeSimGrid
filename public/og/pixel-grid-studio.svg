<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.95" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="rgba(0,0,0,0.2)" />
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)" />
    </filter>
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />
  <rect width="1200" height="630" fill="url(#gridPattern)" />

  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#cardGradient)" filter="url(#shadow)" />

  <!-- Grid with colored cells -->
  <g transform="translate(140, 130)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#ea580c" opacity="0.9" />
    <rect x="48" y="0" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.9" />
    <rect x="96" y="0" width="40" height="40" rx="4" fill="#fbbf24" opacity="0.9" />
    <rect x="144" y="0" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.9" />
    <!-- Row 2 -->
    <rect x="0" y="48" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.9" />
    <rect x="48" y="48" width="40" height="40" rx="4" fill="#fbbf24" opacity="0.9" />
    <rect x="96" y="48" width="40" height="40" rx="4" fill="#ea580c" opacity="0.9" />
    <rect x="144" y="48" width="40" height="40" rx="4" fill="#fbbf24" opacity="0.9" />
    <!-- Row 3 -->
    <rect x="0" y="96" width="40" height="40" rx="4" fill="#fbbf24" opacity="0.9" />
    <rect x="48" y="96" width="40" height="40" rx="4" fill="#ea580c" opacity="0.9" />
    <rect x="96" y="96" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.9" />
    <rect x="144" y="96" width="40" height="40" rx="4" fill="#ea580c" opacity="0.9" />
    <!-- Row 4 -->
    <rect x="0" y="144" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.9" />
    <rect x="48" y="144" width="40" height="40" rx="4" fill="#fbbf24" opacity="0.9" />
    <rect x="96" y="144" width="40" height="40" rx="4" fill="#fbbf24" opacity="0.9" />
    <rect x="144" y="144" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.9" />
  </g>

  <!-- Grid size label -->
  <g transform="translate(870, 150)">
    <rect x="0" y="0" width="120" height="40" rx="8" fill="#ea580c" opacity="0.85" />
    <text x="60" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">32 x 32</text>
  </g>

  <!-- Grid lines icon -->
  <g transform="translate(880, 220)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#ea580c" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="25" x2="100" y2="25" stroke="#f59e0b" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="50" x2="100" y2="50" stroke="#fbbf24" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="75" x2="100" y2="75" stroke="#ea580c" stroke-width="3" opacity="0.7" />
    <line x1="0" y1="0" x2="0" y2="75" stroke="#ea580c" stroke-width="3" opacity="0.7" />
    <line x1="33" y1="0" x2="33" y2="75" stroke="#f59e0b" stroke-width="3" opacity="0.7" />
    <line x1="66" y1="0" x2="66" y2="75" stroke="#fbbf24" stroke-width="3" opacity="0.7" />
    <line x1="100" y1="0" x2="100" y2="75" stroke="#ea580c" stroke-width="3" opacity="0.7" />
  </g>

  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#textShadow)">LifeSimGrid</text>

  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1e293b">Pixel Grid Studio</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="normal" fill="#64748b">Image to Pixel Art Grid Converter</text>

  <rect x="60" y="590" width="1080" height="2" rx="1" fill="#e2e8f0" opacity="0.5" />
</svg>
