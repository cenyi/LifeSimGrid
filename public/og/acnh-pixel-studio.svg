<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.95" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="rgba(0,0,0,0.2)" />
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)" />
    </filter>
    <pattern id="pixelGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none" />
      <rect x="0" y="0" width="14" height="14" fill="rgba(255,255,255,0.08)" rx="2" />
      <rect x="16" y="16" width="14" height="14" fill="rgba(255,255,255,0.08)" rx="2" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />
  <rect width="1200" height="630" fill="url(#pixelGrid)" />

  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#cardGradient)" filter="url(#shadow)" />

  <!-- Pixel art icon cluster -->
  <g transform="translate(140, 130)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#10b981" opacity="0.9" />
    <rect x="48" y="0" width="40" height="40" rx="4" fill="#34d399" opacity="0.9" />
    <rect x="96" y="0" width="40" height="40" rx="4" fill="#6ee7b7" opacity="0.9" />
    <rect x="0" y="48" width="40" height="40" rx="4" fill="#059669" opacity="0.9" />
    <rect x="48" y="48" width="40" height="40" rx="4" fill="#10b981" opacity="0.9" />
    <rect x="96" y="48" width="40" height="40" rx="4" fill="#34d399" opacity="0.9" />
    <rect x="0" y="96" width="40" height="40" rx="4" fill="#047857" opacity="0.9" />
    <rect x="48" y="96" width="40" height="40" rx="4" fill="#059669" opacity="0.9" />
    <rect x="96" y="96" width="40" height="40" rx="4" fill="#10b981" opacity="0.9" />
  </g>

  <!-- Leaf icon (ACNH motif) -->
  <g transform="translate(880, 140)">
    <ellipse cx="60" cy="50" rx="55" ry="45" fill="#059669" opacity="0.85" />
    <ellipse cx="60" cy="50" rx="40" ry="30" fill="#10b981" opacity="0.9" />
    <line x1="60" y1="25" x2="60" y2="80" stroke="#047857" stroke-width="3" />
    <line x1="40" y1="45" x2="60" y2="35" stroke="#047857" stroke-width="2" />
    <line x1="80" y1="45" x2="60" y2="35" stroke="#047857" stroke-width="2" />
  </g>

  <!-- Color palette dots -->
  <g transform="translate(880, 280)">
    <circle cx="20" cy="0" r="14" fill="#ef4444" opacity="0.85" />
    <circle cx="55" cy="0" r="14" fill="#fbbf24" opacity="0.85" />
    <circle cx="90" cy="0" r="14" fill="#3b82f6" opacity="0.85" />
    <circle cx="20" cy="35" r="14" fill="#8b5cf6" opacity="0.85" />
    <circle cx="55" cy="35" r="14" fill="#ec4899" opacity="0.85" />
    <circle cx="90" cy="35" r="14" fill="#f97316" opacity="0.85" />
  </g>

  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" filter="url(#textShadow)">LifeSimGrid</text>

  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1e293b">ACNH Custom Design Converter</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="normal" fill="#64748b">Image to Animal Crossing Pixel Patterns</text>

  <rect x="60" y="590" width="1080" height="2" rx="1" fill="#e2e8f0" opacity="0.5" />
</svg>
